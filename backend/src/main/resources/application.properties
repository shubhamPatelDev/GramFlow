# Server Configuration
server.port=${PORT:8080}

# Custom Security Properties
app.encryption.key=${APP_ENCRYPTION_KEY:default_encryption_key_please_change}
app.jwt.secret=${APP_JWT_SECRET:default_jwt_secret_key_please_change_this_is_too_short}
app.jwt.expiration-ms=86400000

# Meta Developer Credentials
app.facebook.client-id=${APP_FACEBOOK_CLIENT_ID:dummy_id}
app.facebook.client-secret=${APP_FACEBOOK_CLIENT_SECRET:dummy_secret}
app.facebook.verify-token=${APP_FACEBOOK_VERIFY_TOKEN:dummy_token}

# Dummy Mail Configuration
spring.mail.host=localhost
spring.mail.port=2525

# Read .env file
spring.config.import=optional:file:.env[.properties]

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:dummy_razorpay_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_razorpay_secret}
