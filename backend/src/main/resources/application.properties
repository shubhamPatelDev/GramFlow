# Server Configuration
server.port=8080

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:file:./data/commentordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Custom Security Properties
app.encryption.key=${APP_ENCRYPTION_KEY}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# Meta Developer Credentials
app.facebook.client-id=${APP_FACEBOOK_CLIENT_ID}
app.facebook.client-secret=${APP_FACEBOOK_CLIENT_SECRET}
app.facebook.verify-token=${APP_FACEBOOK_VERIFY_TOKEN}

# Dummy Mail Configuration
spring.mail.host=localhost
spring.mail.port=2525

# Read .env file
spring.config.import=optional:file:.env[.properties]

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
